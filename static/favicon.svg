<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d6efd" />
      <stop offset="100%" stop-color="#0043a8" />
    </linearGradient>
  </defs>
  <!-- Background with modern rounded corners -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <!-- Printer icon in high-contrast white and soft blue accent -->
  <g fill="#ffffff">
    <!-- Paper feed top -->
    <path d="M160 96h192v96H160z" opacity="0.85"/>
    <!-- Main body of the printer -->
    <path d="M96 160h320v192H96z" opacity="0.95"/>
    <path d="M80 192a32 32 0 0 0-32 32v128a32 32 0 0 0 32 32h352a32 32 0 0 0 32-32V224a32 32 0 0 0-32-32H80z"/>
    <!-- Paper output bottom -->
    <path d="M144 320h224v112H144z"/>
    <!-- Printed page detail lines in blue -->
    <rect x="176" y="352" width="160" height="12" rx="6" fill="#0d6efd"/>
    <rect x="176" y="380" width="112" height="12" rx="6" fill="#93c5fd"/>
    <!-- Power/Status Light (Active Green) -->
    <circle cx="416" cy="240" r="14" fill="#4ade80"/>
  </g>
</svg>
